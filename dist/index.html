<!DOCTYPE html>
<html lang="ko">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>SUNCAT OS</title>

  <link
    rel="stylesheet"
    href="./style.css"
  >

  <link
    href="https://fonts.googleapis.com/css2?family=42dot+Sans:wght@300..800&display=swap"
    rel="stylesheet"
  >

</head>

<body>

  <!-- 잠금화면 -->

  <section
    id="lockscreen"
    class="lockscreen"
  >

    <div class="lock-wallpaper"></div>

    <div class="dynamic-island"></div>

    <div class="lock-content">

      <div
        id="lockDate"
        class="lock-date"
      >
        6월 1일 월요일
      </div>

      <div
        id="lockTime"
        class="lock-time"
      >
        00:00
      </div>

    </div>

    <div class="swipe-area">

      <div class="swipe-bar"></div>

      <p>
        위로 스와이프하여 잠금 해제
      </p>

    </div>

  </section>

  <!-- 홈화면 -->

  <section
    id="home"
    class="home"
  >

    <div class="wallpaper"></div>

    <div class="dynamic-island"></div>

    <!-- 상태바 -->

    <div class="status-bar">

      <div id="statusTime">
        00:00
      </div>

      <div class="status-icons">

        <span>📶</span>

        <span>📡</span>

        <span>🔋</span>

      </div>

    </div>

    <!-- 제목 -->

    <div class="hero">

      <h1>
        SUNCAT
      </h1>

      <p>
        Made by SUNCAT
      </p>

    </div>

    <!-- 앱 -->

    <div class="app-grid">

      <div
        id="photoApp"
        class="app"
      >

        <div class="app-icon photos">

          📸

        </div>

        <span>
          사진
        </span>

      </div>

      <div
        class="app"
      >

        <div class="app-icon discord">

          💬

        </div>

        <span>
          Discord
        </span>

      </div>

      <div
        class="app"
      >

        <div class="app-icon profile">

          👤

        </div>

        <span>
          프로필
        </span>

      </div>

      <div
        class="app"
      >

        <div class="app-icon music">

          🎵

        </div>

        <span>
          음악
        </span>

      </div>

    </div>

    <!-- Dock -->

    <div class="dock">

      <div class="dock-icon">

        🌈

      </div>

      <div class="dock-icon">

        💬

      </div>

      <div class="dock-icon">

        👤

      </div>

      <div class="dock-icon">

        ⚙️

      </div>

    </div>

  </section>

  <!-- 사진 앱 -->

  <section
    id="gallery"
    class="gallery"
  >

    <div class="gallery-header">

      <button
        id="closeGallery"
      >
        ←
      </button>

      <h2>
        사진
      </h2>

    </div>


    <!-- 이미지 목록 -->


    <div class="gallery-grid">

      <img src="./image.png">

      <img src="./image2.png">

      <img src="./image3.png">

      <img src="./image4.png">

    </div>

  </section>

  <!-- 확대 뷰어 -->

  <section
    id="viewer"
    class="viewer"
  >

    <button
      id="prevImage"
      class="viewer-btn left"
    >
      ❮
    </button>

    <img
      id="viewerImage"
      src=""
    >

    <button
      id="nextImage"
      class="viewer-btn right"
    >
      ❯
    </button>

    <div
      id="closeViewer"
      class="viewer-close"
    >
      ✕
    </div>

  </section>

  <script src="./app.js"></script>

</body>
</html>
